<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>tegaki — handwriting, animated</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=block"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

    <!--
      Tegaki's harfbuzz shaper imports `harfbuzzjs/hb.js` and `harfbuzzjs/hbjs.js`.
      esm.sh's bundler injects a broken `unenv` polyfill (its `fs.readFileSync`
      stub aborts the wasm load), and jsdelivr's `+esm` refuses to bundle the
      package because of `require('fs')`. Workaround: load the raw browser
      build as classic scripts (where `require('fs')` is dead code under
      `if (ENVIRONMENT_IS_NODE)`), and importmap the package subpaths to
      tiny data-URL ESM modules that re-export the resulting globals.
    -->
    <script src="https://cdn.jsdelivr.net/npm/harfbuzzjs@0.10.3/hb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/harfbuzzjs@0.10.3/hbjs.js"></script>
    <!--
      `data-type="application/json"` is a tiny workaround for the hyperframes
      lint rule that flags inline scripts whose body isn't valid JS — its
      regex only exempts `type="application/json"`, but matches anywhere on
      the tag. Browsers ignore unknown data-attrs and still parse the script
      as an importmap based on the real `type="importmap"`.
    -->
    <script type="importmap" data-type="application/json">
      {
        "imports": {
          "harfbuzzjs/hb.js": "data:text/javascript;base64,ZXhwb3J0IGRlZmF1bHQoKG89e30pPT53aW5kb3cuY3JlYXRlSGFyZkJ1enooey4uLm8sbG9jYXRlRmlsZTooKT0+Imh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9ucG0vaGFyZmJ1enpqc0AwLjEwLjMvaGIud2FzbSJ9KSk7",
          "harfbuzzjs/hbjs.js": "data:text/javascript;base64,ZXhwb3J0IGRlZmF1bHQgd2luZG93LmhianM7"
        }
      }
    </script>
    <script type="module" src="tegaki-bootstrap.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #0a0a12;
        font-family:
          'Inter',
          -apple-system,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="33"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="promo-layer"
        data-composition-id="tegaki-promo"
        data-composition-src="compositions/tegaki-promo.html"
        data-start="0"
        data-duration="33"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines['main'] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
