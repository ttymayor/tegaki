<template id="tegaki-promo-template">
  <div id="tegaki-promo" data-composition-id="tegaki-promo" data-width="1920" data-height="1080" data-duration="33">
    <!-- ================================================================ -->
    <!-- BACKGROUND                                                        -->
    <!-- ================================================================ -->
    <div class="paper-bg"></div>
    <div class="paper-grain"></div>
    <div class="seal" id="seal"></div>

    <!-- ================================================================ -->
    <!-- SCENE 1 — HERO                                                    -->
    <!-- ================================================================ -->
    <div id="scene-1" class="scene">
      <div class="s1-stack">
        <div class="s1-mark-wrap">
          <tegaki-renderer
            id="hero-tegaki"
            class="hero-tegaki"
            data-bundle="caveat"
            text="tegaki"
            time="0%"
          ></tegaki-renderer>
        </div>
        <div class="s1-rule"></div>
        <div class="s1-sub">手書き — handwriting, animated</div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCENE 2 — ANY TEXT / ANY FONT / ANY LANGUAGE                      -->
    <!-- ================================================================ -->
    <div id="scene-2" class="scene">
      <div class="s2-stack">
        <div class="s2-row" id="s2-row-1">
          <div class="s2-tag">01</div>
          <tegaki-renderer
            class="s2-line"
            id="s2-line-1"
            data-bundle="italianno"
            text="Any text."
            time="0%"
          ></tegaki-renderer>
        </div>
        <div class="s2-row" id="s2-row-2">
          <div class="s2-tag">02</div>
          <tegaki-renderer
            class="s2-line"
            id="s2-line-2"
            data-bundle="tangerine"
            text="Any font."
            time="0%"
          ></tegaki-renderer>
        </div>
        <div class="s2-row" id="s2-row-3">
          <div class="s2-tag">03</div>
          <tegaki-renderer
            class="s2-line"
            id="s2-line-3"
            data-bundle="parisienne"
            text="Any language."
            time="0%"
          ></tegaki-renderer>
        </div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCENE 3 — MULTI-SCRIPT (HERO BEAT)                                -->
    <!-- ================================================================ -->
    <div id="scene-3" class="scene">
      <div class="s3-grid">
        <div class="s3-cell" id="s3-cell-latin">
          <div class="s3-label">
            <span class="s3-label-script">Latin</span>
            <span class="s3-label-font">Caveat</span>
          </div>
          <tegaki-renderer
            class="s3-text"
            id="s3-tegaki-latin"
            data-bundle="caveat"
            text="Hello, world."
            time="0%"
          ></tegaki-renderer>
        </div>

        <div class="s3-cell" id="s3-cell-hebrew">
          <div class="s3-label">
            <span class="s3-label-script">עברית</span>
            <span class="s3-label-font">Suez One</span>
          </div>
          <tegaki-renderer
            class="s3-text"
            id="s3-tegaki-hebrew"
            data-bundle="suezOne"
            direction="rtl"
            text="שלום עולם"
            time="0%"
          ></tegaki-renderer>
        </div>

        <div class="s3-cell" id="s3-cell-arabic">
          <div class="s3-label">
            <span class="s3-label-script">العربية</span>
            <span class="s3-label-font">Amiri</span>
          </div>
          <tegaki-renderer
            class="s3-text"
            id="s3-tegaki-arabic"
            data-bundle="amiri"
            direction="rtl"
            text="السلام عليكم"
            time="0%"
          ></tegaki-renderer>
        </div>

        <div class="s3-cell" id="s3-cell-japanese">
          <div class="s3-label">
            <span class="s3-label-script">日本語</span>
            <span class="s3-label-font">Klee One</span>
          </div>
          <tegaki-renderer
            class="s3-text"
            id="s3-tegaki-japanese"
            data-bundle="kleeOne"
            text="手書き"
            time="0%"
          ></tegaki-renderer>
        </div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCENE 4 — FRAMEWORKS                                              -->
    <!-- ================================================================ -->
    <div id="scene-4" class="scene">
      <div class="s4-stack">
        <div class="s4-headline">
          One renderer.<br />
          <span class="s4-accent">Every framework.</span>
        </div>
        <div class="s4-pills">
          <div class="s4-pill">React</div>
          <div class="s4-pill">Svelte</div>
          <div class="s4-pill">Vue</div>
          <div class="s4-pill">Solid</div>
          <div class="s4-pill">Astro</div>
          <div class="s4-pill">Web Components</div>
          <div class="s4-pill">Remotion</div>
        </div>
        <div class="s4-code">
          <span class="s4-code-clip">
            <span class="tk-keyword">import</span>
            <span class="tk-default">{ TegakiRenderer }</span>
            <span class="tk-keyword">from</span>
            <span class="tk-string">'tegaki/react'</span>;
          </span>
        </div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCENE 5 — EFFECTS                                                 -->
    <!-- ================================================================ -->
    <div id="scene-5" class="scene">
      <div class="s5-grid">
        <div class="s5-cell" id="s5-cell-1">
          <div class="s5-label">plain</div>
          <tegaki-renderer
            class="s5-text"
            id="s5-tegaki-1"
            data-bundle="caveat"
            text="tegaki"
            time="0%"
          ></tegaki-renderer>
        </div>
        <div class="s5-cell" id="s5-cell-2">
          <div class="s5-label">glow</div>
          <tegaki-renderer
            class="s5-text"
            id="s5-tegaki-2"
            data-bundle="caveat"
            data-effects='{"glow":{"color":"#06d6a0","radius":18}}'
            text="tegaki"
            time="0%"
          ></tegaki-renderer>
        </div>
        <div class="s5-cell" id="s5-cell-3">
          <div class="s5-label">gradient</div>
          <tegaki-renderer
            class="s5-text"
            id="s5-tegaki-3"
            data-bundle="caveat"
            data-effects='{"globalGradient":{"colors":["#dc2626","#f5e9d4","#06d6a0"],"angle":15}}'
            text="tegaki"
            time="0%"
          ></tegaki-renderer>
        </div>
        <div class="s5-cell" id="s5-cell-4">
          <div class="s5-label">wobble</div>
          <tegaki-renderer
            class="s5-text"
            id="s5-tegaki-4"
            data-bundle="caveat"
            data-effects='{"wobble":{"amplitude":4,"frequency":1.6}}'
            text="tegaki"
            time="0%"
          ></tegaki-renderer>
        </div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- SCENE 6 — CTA                                                     -->
    <!-- ================================================================ -->
    <div id="scene-6" class="scene">
      <div class="s6-stack">
        <tegaki-renderer
          id="cta-tegaki"
          class="cta-tegaki"
          data-bundle="caveat"
          data-effects='{"globalGradient":{"colors":["#f5e9d4","#dc2626"],"angle":0}}'
          text="tegaki"
          time="0%"
        ></tegaki-renderer>
        <div class="cta-rule"></div>
        <div class="cta-install"><span class="cta-prompt">$</span> bun add tegaki</div>
        <div class="cta-url">github.com/KurtGokhan/tegaki</div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- TRANSITION OVERLAYS                                               -->
    <!-- ================================================================ -->
    <div id="ink-wipe"></div>
    <div id="black-out"></div>

    <!-- ================================================================ -->
    <!-- STYLES                                                            -->
    <!-- ================================================================ -->
    <style>

        position: relative;

        height: 1080px;
        background: #0a0a12;

        background:
          radial-gradient(ellipse at 30% 20%, rgba(245, 233, 212, 0.04) 0%, transparent 60%),

        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;

        color: #94a3b8;

      }
      .s3-text {
        font-size: 110px;

      .s4-stack {

      /* ================================================================ */
      /* SCENE 5 — EFFECTS                                                */
      /* ================================================================ */
      .s5-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 32px;
        width: 1700px;
        height: 920px;
      }
      .s5-cell {
        position: relative;
        background: rgba(245, 233, 212, 0.02);
        border: 1px solid rgba(245, 233, 212, 0.1);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        opacity: 0;
      }
      .s5-label {
        position: absolute;
        top: 24px;
        left: 32px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #94a3b8;
      }

        font-size: 200px;

      /* ================================================================ */
      /* SCENE 6 — CTA                                                    */
      /* ================================================================ */
      .s6-stack {

      /* ================================================================ */

    <!-- ================================================================ -->
    <!-- SCRIPT                                                            -->
    <!-- ================================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Bundles & effects are wired by tegaki-bootstrap.js (a MutationObserver
      // attaches each bundle the first time its <tegaki-renderer> appears).
      const tl = gsap.timeline({ paused: true });

      // Drive each <tegaki-renderer>'s handwriting from 0% → 100%. tegaki's
      // WC (≥0.17.1) accepts a percentage string in `time` and resolves it
      // to controlled progress mode internally — so we don't have to know
      // per-phrase durations and we don't have to compute anything in
      // onUpdate. GSAP's attr plugin tweens unit-suffixed strings cleanly
      // through seeks.
      const drawTegaki = (selector, position, drawDuration, ease) => {
        tl.fromTo(
          selector,
          { attr: { time: '0%' } },
          { attr: { time: '100%' }, duration: drawDuration, ease: ease ?? 'power1.out' },
          position,
        );
      };

      // ---------------------------------------------------------------------
      // SCENE 1 — HERO  (0.0s – 4.0s)
      // ---------------------------------------------------------------------
      tl.set('#scene-1', { autoAlpha: 1 }, 0);
      // Hero "tegaki" draws — overshoot time so it definitely lands on its
      // last frame regardless of measured bundle duration.
      tl.fromTo(
        '#hero-tegaki',
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' },
        0.2,
      );
      drawTegaki('#hero-tegaki', 0.4, 2.6, 'power2.inOut');
      tl.to('.s1-rule', { width: 540, duration: 0.6, ease: 'expo.out' }, 2.4);
      tl.to('.s1-sub', { opacity: 1, duration: 0.7, ease: 'power1.out' }, 2.7);
      tl.to('#seal', { opacity: 1, scale: 1, rotation: -6, duration: 0.5, ease: 'back.out(2)' }, 3.0);

      // Cross-fade scene 1 → scene 2 (4.0 – 4.2)
      tl.to('#scene-1', { autoAlpha: 0, duration: 0.2, ease: 'power1.inOut' }, 4.0);

      // ---------------------------------------------------------------------
      // SCENE 2 — ANY TEXT / ANY FONT / ANY LANGUAGE  (4.2 – 10.0)
      // ---------------------------------------------------------------------
      tl.set('#scene-2', { autoAlpha: 1 }, 4.0);

      // Line 1 — "Any text." in Italianno (4.4 – 5.9)
      tl.fromTo(
        '#s2-row-1',
        { opacity: 0, x: -30 },
        { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' },
        4.4,
      );
      drawTegaki('#s2-line-1', 4.5, 1.5, 'power1.out');

      // Line 2 — "Any font." in Tangerine (6.0 – 7.7)
      tl.fromTo(
        '#s2-row-2',
        { opacity: 0, x: -30 },
        { opacity: 1, x: 0, duration: 0.4, ease: 'expo.out' },
        6.0,
      );
      drawTegaki('#s2-line-2', 6.1, 1.6, 'sine.inOut');

      // Line 3 — "Any language." in Parisienne (7.8 – 9.7)
      tl.fromTo(
        '#s2-row-3',
        { opacity: 0, x: -30 },
        { opacity: 1, x: 0, duration: 0.4, ease: 'back.out(1.4)' },
        7.8,
      );
      drawTegaki('#s2-line-3', 7.9, 1.8, 'power2.out');

      // Cross-fade scene 2 → scene 3 (10.0 – 10.2)
      tl.to('#scene-2', { autoAlpha: 0, duration: 0.2, ease: 'power1.inOut' }, 10.0);

      // ---------------------------------------------------------------------
      // SCENE 3 — MULTI-SCRIPT  (10.2 – 20.0)  HERO BEAT
      // ---------------------------------------------------------------------
      tl.set('#scene-3', { autoAlpha: 1 }, 10.0);

      // Cell 1: Latin (10.4 – 12.4)
      tl.fromTo(
        '#s3-cell-latin',
        { opacity: 0, y: 30, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'power3.out' },
        10.4,
      );
      drawTegaki('#s3-tegaki-latin', 10.6, 1.6, 'power1.out');

      // Cell 2: Hebrew (12.4 – 14.4)
      tl.fromTo(
        '#s3-cell-hebrew',
        { opacity: 0, y: 30, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'expo.out' },
        12.4,
      );
      drawTegaki('#s3-tegaki-hebrew', 12.6, 1.6, 'sine.inOut');

      // Cell 3: Arabic (14.4 – 16.4)
      tl.fromTo(
        '#s3-cell-arabic',
        { opacity: 0, y: 30, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.3)' },
        14.4,
      );
      drawTegaki('#s3-tegaki-arabic', 14.6, 1.7, 'power2.inOut');

      // Cell 4: Japanese (16.4 – 19.6)
      tl.fromTo(
        '#s3-cell-japanese',
        { opacity: 0, y: 30, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: 'power3.out' },
        16.4,
      );
      drawTegaki('#s3-tegaki-japanese', 16.6, 2.4, 'power1.inOut');

      // Cross-fade scene 3 → scene 4 (20.0 – 20.2)
      tl.to('#scene-3', { autoAlpha: 0, duration: 0.2, ease: 'power1.inOut' }, 20.0);

      // ---------------------------------------------------------------------
      // SCENE 4 — FRAMEWORKS  (20.2 – 24.0)
